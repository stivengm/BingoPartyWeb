<app-header></app-header>
<div class="circle_primary"></div>
<div class="circle_secondary"></div>

<div class="section_home_welcome">
    <img class="img_bingo_celebration" src="assets/images/bingo_celebration.png" alt="banner_bingo_celebration">

    <h1 class="title_bingo_home">¡Te damos la bienvenida!</h1>
    <p class="description_bingo_home">Prepárate para la emoción del mejor Bingo social.</p>

    <div class="form_user">
        <div class="form_group">
            <label for="alias">Nombre de jugador</label>
            <input type="text" id="alias" name="alias" placeholder="Escribe tu alias..." [formControl]="aliasControl">
        </div>
    </div>

    <div class="section_actions">
        <button class="btn primary_button" (click)="selectUser(true)">
            <div class="section_icon_king">
                <img src="assets/icons/king.svg" alt="Icono corona">
            </div>
            Ser el host
            <img src="assets/icons/arrow-right-button.svg" class="icon_arrow" alt="Icono flecha a la derecha">
        </button>
        <button class="btn secondary_button" (click)="selectUser(false)">
            <div class="section_icon_users">
                <img src="assets/icons/users.svg" alt="Icono usuarios">
            </div>
            Unirme al juego
            <img src="assets/icons/arrow-right-line.svg" alt="Icono flecha a la derecha login">
        </button>
    </div>
</div>

<app-bingo></app-bingo>
<app-version></app-version>
