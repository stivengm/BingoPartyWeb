<app-header></app-header>

<div class="content_create_room">
    <div class="section_code_room">
        <p class="text_room">Código de la sala</p>
        
        <div class="section_code">
            <h2 class="code">#B1NGO</h2>
            <button class="btn primary_button">Copiar</button>
        </div>
    </div>

    <div class="section_type_game">
        <p class="text_style_game">Tipo de juego</p>

        <div class="options_games">
            <div class="item_game" [ngClass]="{'selected': idGameType == 1 }" (click)="selectedGameType(1)">
                <div class="section_img_icon">
                    <img src="assets/images/digital-game.svg" alt="Icono juego digital">
                </div>
                <div class="info_game_type">
                    <h3 class="title_game_type">Juego Digital</h3>
                    <p class="description_game_type">Sorteo automático animado</p>
                </div>
            </div>
            <div class="item_game" [ngClass]="{'selected': idGameType == 2 }" (click)="selectedGameType(2)">
                <div class="section_img_icon">
                    <img src="assets/images/physical-game.svg" alt="Icono juego físico">
                </div>
                <div class="info_game_type">
                    <h3 class="title_game_type">Juego Físico</h3>
                    <p class="description_game_type">Marcado manual de bolillas</p>
                </div>
            </div>
        </div>
    </div>

    <div class="section_game_board">
        <p class="text_game_board">Estilo de cartón</p>

        <div class="options_games_boards">
            @for (board of boards; track $index) {
                <div class="item_board" [ngClass]="{'selected': idBoardType == ($index + 1) }" (click)="selectedBoardType($index + 1)">
                    <img class="img_board" [src]="'assets/images/bingo_tarjeton_' + ($index + 1)  +'.png'" [alt]="'Tablero de Bingo número' + ($index + 1)">
                </div>
            }
        </div>
    </div>

    <div class="actions_buttons">
        <button class="btn primary_button" (click)="createRoom()">
            <span>Crear sala</span>
            <img class="icon_right" src="assets/icons/arrow-right.svg" alt="Icono flecha a la derecha">
        </button>
    </div>
</div>
