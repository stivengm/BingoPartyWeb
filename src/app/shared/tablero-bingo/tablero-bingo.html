<div class="board">
    <div class="board_letters">
        @for (letter of letters; track $index) {
            <div class="board_letter">
                {{ letter }}
            </div>
        }
    </div>
    @for (row of board; track $index) {
        <div class="board_row">
            @for (cell of row; track $index) {
                <div
                    class="board_cell"
                    [class.marked]="cell.marked"
                    [class.disabled]="cell.disabled"
                    [class]="cell.cssClass"
                    (click)="onSelect(cell)"
                >
                    {{ cell.value }}
                </div>
            }
        </div>
    }
</div>
