<div class="board">
    @if (isViewLetters) {
        <div class="board_letters">
            @for (letter of letters; track $index) {
                <div class="board_letter">
                    {{ letter }}
                </div>
            }
        </div>
    }
    @for (row of board; track $index; let rowIndex = $index) {
        <div class="board_row">
            @for (cell of row; track $index; let colIndex = $index) {
                <div
                    class="board_cell"
                    [class.marked]="cell.marked"
                    [class.ingame]="isInGame(rowIndex, colIndex)"
                    [class.disabled]="cell.disabled"
                    [class]="cell.cssClass"
                    (click)="onSelect(cell)"
                >
                    {{ cell.value }}
                </div>
            }
        </div>
    }
</div>
